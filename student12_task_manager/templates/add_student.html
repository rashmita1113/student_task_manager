{% extends 'layout.html' %}

{% block content %}

<div class="container mt-4">
    <h2>Add Student</h2>

    <form action="/add_student/" method="POST">

        <div class="row mt-4">

            <div class="col-md-6">
                <label class="form-label">First Name</label>
                <input
                    type="text"
                    name="first_name"
                    class="form-control"
                    required
                >
            </div>

            <div class="col-md-6">
                <label class="form-label">Last Name</label>
                <input
                    type="text"
                    name="last_name"
                    class="form-control"
                    required
                >
            </div>

        </div>

        <div class="row mt-3">

            <div class="col-md-4">
                <label class="form-label">Gender</label>
                <select
                    name="gender"
                    class="form-select"
                    required
                >
                    <option value="">
                        Select Gender

                    </option>

                    <option value="Male">
                        Male

                    </option>

                    <option value="Female">
                        Female

                    </option>
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Mobile Number</label>

                <input
                    type="text"
                    name="mobile_number"
                    class="form-control"
                    required
                >
            </div>

            <div class="col-md-4">
                <label class="form-label">Course Name</label>

                <input
                    type="text"
                    name="course_name"
                    class="form-control"
                    required
                >
            </div>

        </div>

        <div class="row mt-3">

            <div class="col-md-6">
                <label for="form-label">Email Address</label>
                <input
                    type="email"
                    name="email"
                    class="form-control"
                    required
                >
            </div>

        </div>

        <div class="mt-4">

            <button
            type="submit" class="btn btn-primary">
            Add Student 
            </button>
        
        </div>

    </form>
</div>

{% endblock %}
