{% extends 'layout.html' %}

{% block content %}

<h1>Student</h1>

<table id="student_table"
 class="table table-bordered" table-striped lable-hover>
    <thead>
        <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Course</th>
        </tr>
    </thead>
    <tbody>
     {% for student in students %}
     <tr>
            <td>{{ student.student_id }}</td>
                <td>
                    {{ student.first_name}}
                    {{ student.last_name}}
                </td>
            <td> {{ student.course_name }}</td>
     </tr>
     {% endfor %}
    </tbody>
     </table>
     {% endblock %}
